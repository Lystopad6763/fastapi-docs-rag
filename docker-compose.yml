# docker-compose.yml — local infrastructure for the Q&A RAG API.
# Brings up both databases in containers with a single `docker compose up -d`,
# so you don't have to install Qdrant and Redis on the host manually.

services:
  # --- Qdrant: vector database -----------------------------------------------
  # Stores embeddings: document chunks (for search) and questions (for the semantic cache).
  qdrant:
    image: qdrant/qdrant:latest      # ready-made official image, nothing to compile
    container_name: qa_qdrant        # fixed name — convenient for `docker exec` and logs
    ports:
      - "6333:6333"   # REST API + web dashboard (http://localhost:6333/dashboard)
      - "6334:6334"   # gRPC (faster protocol; qdrant-client can use it)
    volumes:
      - qdrant_data:/qdrant/storage  # data lives in a volume, not inside the container

  # --- Redis: fast in-memory counters ----------------------------------------
  # Used for token-bucket rate limiting and metrics. NOT for vectors.
  redis:
    image: redis:7-alpine            # alpine = minimal image (~40MB)
    container_name: qa_redis
    ports:
      - "6379:6379"                  # standard Redis port
    volumes:
      - redis_data:/data             # persist counters across restarts

# --- Named volumes -----------------------------------------------------------
# Separate Docker storage that SURVIVES container recreation.
# Without it, `docker compose down` would wipe the indexed vectors — and the document
# would have to be reindexed from scratch every time.
volumes:
  qdrant_data:
  redis_data: