# Fly.io deployment config. Create the app once with `fly launch --no-deploy` (it will
# set `app` and may adjust this file), set the secrets (see DEPLOY.md), then `fly deploy`.
#
# Streaming note: auto_stop_machines is OFF so the machine never cold-starts mid-stream,
# which would otherwise cut the SSE connection (see the homework's §11 Fly.io note).

app = "fastapi-docs-rag"
primary_region = "fra"        # Frankfurt — low latency to Central/Eastern Europe

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 40
    hard_limit = 60

[checks.health]
  type = "http"
  port = 8000
  method = "GET"
  path = "/health"
  interval = "15s"
  timeout = "5s"
  grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
